    { id:'gbt8', cat:'basin',     catLabel:'Basins & Tubs', title:'Heritage Marble Tub',          img:'wash-basin/bathtub8.webp'        },

    /* Marble Tables вЂ” 8 */
    { id:'gt1', cat:'table',      catLabel:'Marble Tables', title:'Book-Matched Dining Table',    img:'marble-table/marbletable1.webp'  },
    { id:'gt2', cat:'table',      catLabel:'Marble Tables', title:'Marble Coffee Table Top',      img:'marble-table/marbletable2.webp'  },
    { id:'gt3', cat:'table',      catLabel:'Marble Tables', title:'Console Entry Table',          img:'marble-table/marbletable3.webp'  },
    { id:'gt4', cat:'table',      catLabel:'Marble Tables', title:'Round Bistro Table Top',       img:'marble-table/marbletable4.webp'  },
    { id:'gt5', cat:'table',      catLabel:'Marble Tables', title:'Stone Island Countertop',      img:'marble-table/marbletable5.webp'  },
    { id:'gt6', cat:'table',      catLabel:'Marble Tables', title:'Hexagonal Side Table',         img:'marble-table/marbletable6.webp'  },
    { id:'gt7', cat:'table',      catLabel:'Marble Tables', title:'Marble Dining Centrepiece',    img:'marble-table/marbletable7.webp'  },
    { id:'gt8', cat:'table',      catLabel:'Marble Tables', title:'Kitchen Marble Counter',       img:'marble-table/marbletable8.webp'  }
  ];

  /* в”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђ
     STATE
  в”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђ */
  var PAGE_SIZE     = 9;
  var currentFilter = 'all';
  var currentPage   = 0;
  var filtered      = [];
  var isInitialized = false;

  /* в”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђ
     UTILITIES
  в”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђ */
  function esc(str) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }

  function $(id) { return document.getElementById(id); }

  /* в”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђ
     FILTER
  в”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђ */
  function applyFilter(cat) {
    currentFilter = cat;
    currentPage   = 0;
    filtered = cat === 'all'
      ? ITEMS
      : ITEMS.filter(function (i) { return i.cat === cat; });

    $('galGrid').innerHTML = '';
    $('galTotal').textContent    = filtered.length;
    $('galShowing').textContent  = 0;
    $('galProgress').style.width = '0%';

    var ghost = $('galGhostNum');
    if (ghost) ghost.textContent = filtered.length;

    renderBatch();
  }

  /* в”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђ
     RENDER PAGINATED BATCH
  в”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђ */
  function renderBatch() {
    var grid  = $('galGrid');
    var start = currentPage * PAGE_SIZE;
    var end   = Math.min(start + PAGE_SIZE, filtered.length);
    var batch = filtered.slice(start, end);
    var frag  = document.createDocumentFragment();

    batch.forEach(function (item, idx) {
      var article = document.createElement('article');
      article.className = 'gal-card';
      article.setAttribute('role', 'listitem');
      article.setAttribute('aria-label', item.title);

      article.innerHTML =
        '<img class="gal-img"'
          + ' src="'     + esc(item.img)   + '"'
          + ' alt="'     + esc(item.title) + '"'
          + ' loading="lazy" decoding="async" />'
        + '<div class="gal-card-overlay" aria-hidden="true"></div>'
        + '<div class="gal-card-body">'
          + '<span class="gal-card-rule" aria-hidden="true"></span>'
          + '<span class="gal-card-cat">' + esc(item.catLabel) + '</span>'
          + '<h3 class="gal-card-name">'  + esc(item.title)    + '</h3>'
        + '</div>';

      /* Image error fallback */
      var img = article.querySelector('.gal-img');
      img.addEventListener('error', function () {
        this.style.display = 'none';
      });

      frag.appendChild(article);

      /* Staggered reveal */
      (function (el, delay) {
        setTimeout(function () { el.classList.add('gal-visible'); }, delay);
      })(article, idx * 65);
    });

    grid.appendChild(frag);
    currentPage++;

    /* Update meta */
    var shown = Math.min(currentPage * PAGE_SIZE, filtered.length);
    $('galShowing').textContent  = shown;
    $('galProgress').style.width = (shown / filtered.length * 100) + '%';

    /* Load-more button state */
    var btn  = $('galBtn');
    var info = $('galInfo');

    if (shown >= filtered.length) {
      btn.disabled    = true;
      btn.textContent = 'All Projects Shown';
      info.textContent = shown + ' of ' + filtered.length + ' projects';
    } else {
      btn.disabled = false;
      btn.innerHTML = 'Load More Projects <i class="fas fa-arrow-down" aria-hidden="true"></i>';
      var rem = filtered.length - shown;
      info.textContent = rem + ' more project' + (rem !== 1 ? 's' : '') + ' remaining';
    }
  }

  /* в”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђ
     BUILD FILTER PILLS
  в”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђ */
  function buildFilters() {
    var bar = $('galFilters');
    if (!bar) return;

    CATS.forEach(function (cat) {
      var count = cat.id === 'all'
        ? ITEMS.length
        : ITEMS.filter(function (i) { return i.cat === cat.id; }).length;

      var btn = document.createElement('button');
      btn.className   = 'gal-pill' + (cat.id === 'all' ? ' active' : '');
      btn.dataset.cat = cat.id;
      btn.setAttribute('aria-pressed', cat.id === 'all' ? 'true' : 'false');
      btn.textContent = cat.label + ' (' + count + ')';

      btn.addEventListener('click', function () {
        document.querySelectorAll('.gal-pill').forEach(function (p) {
          p.classList.remove('active');
          p.setAttribute('aria-pressed', 'false');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-pressed', 'true');
        applyFilter(cat.id);
      });

      bar.appendChild(btn);
    });
  }

  /* в”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђ
     SCROLL REVEAL for static header elements
  в”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђ */
  function initReveal() {
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) {
          e.target.classList.add('gal-in-view');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });

    document.querySelectorAll('.gal-reveal').forEach(function (el) {
      io.observe(el);
    });
  }

  /* в”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђ
     INIT
  в”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђв”Ђ в”Ђв”Ђ */
  function init() {
    if (isInitialized) return;

    var filtersEl = $('galFilters');
    var gridEl    = $('galGrid');
    var btnEl     = $('galBtn');

    if (!filtersEl || !gridEl || !btnEl) {
      setTimeout(init, 120);
      return;
    }

    isInitialized = true;

    buildFilters();
    initReveal();

    btnEl.addEventListener('click', function () {
      renderBatch();
    });

    applyFilter('all');

    console.log('%c STONE HUB TRADERS %c Gallery вЂ” ' + ITEMS.length + ' projects across ' + (CATS.length - 1) + ' categories',
      'background:#A89070;color:#fff;padding:2px 8px;font-weight:700',
      'color:#A89070'
    );
    console.log('вњ” Gallery вЂ” ' + ITEMS.length + ' total items');
  }

  /* Multiple init strategies вЂ” mirrors the component loader pattern */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  setTimeout(init, 350);
  setTimeout(init, 1200);

  window.initGalleryComponent = function () {
    isInitialized = false;
    init();
  };

})();
</script>
