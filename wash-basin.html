      if (navigator.share) {
        navigator.share({ title: p.title + ' — Stone Hub Traders', text: p.shortDesc, url: window.location.href }).catch(function(){});
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(window.location.href);
        var btn  = document.getElementById('modalShare');
        var prev = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check" aria-hidden="true"></i>';
        setTimeout(function () { btn.innerHTML = prev; }, 1500);
      }
    }

    /* ── Events ── */
    document.querySelectorAll('.filter-pill').forEach(function (pill) {
      pill.addEventListener('click', function () {
        document.querySelectorAll('.filter-pill').forEach(function (p) { p.classList.remove('active'); });
        pill.classList.add('active');
        applyFilter(pill.dataset.filter);
      });
    });

    document.getElementById('loadMoreBtn').addEventListener('click', renderPage);
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalBackdrop').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });
    document.getElementById('modalImg').addEventListener('click', function () {
      openLightbox(this.src, this.alt);
    });
    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    document.getElementById('lightbox').addEventListener('click', function (e) {
      if (e.target === this) closeLightbox();
    });
    document.getElementById('modalShare').addEventListener('click', shareProduct);
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') { closeLightbox(); closeModal(); }
    });

    /* ── Init ── */
    applyFilter('all');

    console.log('%c STONE HUB TRADERS %c Wash Basin & Bathtub — ' + PRODUCTS.length + ' designs',
      'background:#A89070;color:#fff;padding:2px 8px;font-weight:700', 'color:#A89070');

  })();
  </script>

</body>
</html>
