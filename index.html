    /* ============================================================
       DESIGN TOKENS — STONE HUB TRADERS
       Architectural Minimalist · Stone & Brass Palette
    ============================================================ */
    :root {
      /* Gold: shifted from jewellery #C9A961 → aged brass #A89070

      --gold:           #A89070;
      --gold-light:     #C4AB8C;
      --gold-dark:      #7D6A53;
      --gold-muted:     rgba(168, 144, 112, 0.12);
      --gold-rule:      rgba(168, 144, 112, 0.35);

      /* Neutrals */
      --pure-black:     #000000;
      --charcoal:       #111111;
      --mid-dark:       #1E1E1E;
      --text-dark:      #0D0D0D;
      --text-mid:       #4A4747;
      --text-light:     #7A7672;

      /* Surfaces: warm marble white, not clinical grey */

    /* ============================================================
       PAGE LOADER — Architectural Sequential Reveal
       No bounce. No pulse. Just a clean studio-grade ident.
    ============================================================ */
    .page-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--pure-white);
      z-index: 9999;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .loader-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Logo: clean fade, no scale bounce */
    .loader-logo {
      width: clamp(44px, 7vw, 64px);
      height: clamp(44px, 7vw, 64px);
      object-fit: contain;
      opacity: 0;
      animation: ld-fade 0.5s ease 0.15s forwards;
    }

    /* Thin gold rule extends outward — the signature architectural moment */
    .loader-rule {
      width: 0;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent,
        var(--gold) 25%,
        var(--gold) 75%,
        transparent
      );
      margin: 18px auto 14px;
      animation: ld-rule 0.45s cubic-bezier(0.4, 0, 0.2, 1) 0.45s forwards;
    }

    /* Brand name: precise fade-up */
    .loader-brand {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(0.65rem, 1.2vw, 0.8rem);
      font-weight: 700;
      letter-spacing: clamp(5px, 1.2vw, 10px);
      color: var(--charcoal);
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(5px);
      animation: ld-word 0.4s ease 0.75s forwards;
    }

    /* Tagline: whisper-thin, gold */
    .loader-tagline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.58rem, 0.85vw, 0.68rem);
      font-weight: 300;
      letter-spacing: clamp(2px, 0.6vw, 4px);
      color: var(--gold);
      text-transform: uppercase;
      margin-top: 6px;
      opacity: 0;
      transform: translateY(4px);
      animation: ld-word 0.4s ease 0.95s forwards;
    }

    @keyframes ld-fade {
      to { opacity: 1; }
    }

    @keyframes ld-rule {
      to { width: clamp(40px, 7vw, 56px); }
    }

    @keyframes ld-word {
      to { opacity: 1; transform: translateY(0); }
    }

    body.loaded .page-loader {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* ============================================================
       SITE WRAPPER
    ============================================================ */
    .site-wrapper {
      opacity: 0;
      transition: opacity 0.5s ease 0.1s;
    }

    body.loaded .site-wrapper {
      opacity: 1;
    }

       SITE WRAPPER

  <div class="site-wrapper">
    <nav id="navbarComponent"     role="navigation" aria-label="Main Navigation"></nav>

    <main>
      <header  id="heroComponent"       ></header>
      <section id="aboutComponent"      aria-label="About Stone Hub Traders"></section>
      <section id="categoriesComponent" aria-label="Marble and Granite Categories"></section>

  <!-- ============================================================

  <a href="https://wa.me/917976839230?text=Hello%20Stone%20Hub%20Traders%2C%20I%20would%20like%20to%20inquire%20about%20your%20marble%20and%20granite%20products."
    class="whatsapp-float"

  <!-- ============================================================
       SCRIPTS

  <script>
  // ──────────────────────────────────────────────
  // PERFORMANCE METRICS
  // ──────────────────────────────────────────────
  const _perf = {
    t0: performance.now(),
    fontsReady: false,
    loaded: 0
  };

  document.fonts.ready.then(() => {
    _perf.fontsReady = true;
  });

  // ──────────────────────────────────────────────
  // SCROLL RESTORATION
  // Prevent browser restoring scroll before async
  // components inflate the page height
  // ──────────────────────────────────────────────
  history.scrollRestoration = 'manual';

  window.addEventListener('pagehide', function () {
    sessionStorage.setItem('sht_scroll_y', window.scrollY);
  });

  // ──────────────────────────────────────────────
  // INIT — minimum 1.4s to let loader ident finish
  // ──────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    const MIN_SHOW = 1400;
    const elapsed  = performance.now() - _perf.t0;
    const wait     = Math.max(0, MIN_SHOW - elapsed);

    setTimeout(() => {
      document.body.classList.add('loaded');
      loadComponents();
    }, wait);
  });

  // ──────────────────────────────────────────────
  // COMPONENT LOADER
  // ──────────────────────────────────────────────
  const COMPONENTS = [
    { name: 'navbar',     target: 'navbarComponent'     },
    { name: 'hero',       target: 'heroComponent'       },
    { name: 'about',      target: 'aboutComponent'      },
    { name: 'categories', target: 'categoriesComponent' },
    { name: 'gallery',    target: 'galleryComponent'    },
    { name: 'contact',    target: 'contactComponent'    },
    { name: 'footer',     target: 'footerComponent'     }
  ];

 /* WITH */
async function loadComponents() {
  // Fetch all 7 components over the network simultaneously
  const fetched = await Promise.all(
    COMPONENTS.map(async comp => {
      const resp = await fetch(`${comp.name}.html`);
      return { ...comp, html: await resp.text() };
    })
  );

  // Inject sequentially so DOM order and script execution stay predictable
  for (const comp of fetched) {
    await injectComponent(comp.name, comp.target, comp.html);
    _perf.loaded++;
  }

  const savedY = sessionStorage.getItem('sht_scroll_y');
  if (savedY !== null) {
    window.scrollTo(0, parseInt(savedY, 10));
    sessionStorage.removeItem('sht_scroll_y');
  }

  initGlobal();
}

/* WITH — renamed, accepts pre-fetched html string */
async function injectComponent(name, targetId, html) {
  try {
    const t0       = performance.now();
    const temp     = document.createElement('div');
    temp.innerHTML = html;

    const target = document.getElementById(targetId);
    if (!target) { console.warn(`⚠ #${targetId} not found`); return; }

    temp.querySelectorAll('style').forEach(s => {
      const el = document.createElement('style');
      el.setAttribute('data-component', name);
      el.innerHTML = s.innerHTML;
      document.head.appendChild(el);
      s.remove();
    });

    const scripts = [];
    temp.querySelectorAll('script').forEach(s => {
      scripts.push(s.innerHTML);
      s.remove();
    });

    temp.querySelectorAll('link[href*="fonts.googleapis.com"]').forEach(l => l.remove());

    target.innerHTML = temp.innerHTML;

    await new Promise(r => setTimeout(r, 80));
    scripts.forEach(code => {
      if (!code.trim()) return;
      const el = document.createElement('script');
      el.setAttribute('data-component', name);
      el.innerHTML = code;
      document.body.appendChild(el);
      setTimeout(() => el.parentNode?.removeChild(el), 500);
    });

    console.log(`✔ ${name} — ${Math.round(performance.now() - t0)}ms`);

  } catch (err) {
    console.error(`✖ ${name}:`, err);
  }
}
  // ──────────────────────────────────────────────
  // GLOBAL INTERACTIONS
  // ──────────────────────────────────────────────
  function initGlobal() {
    // Smooth-scroll internal anchors with nav offset
    document.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', e => {
        const href = a.getAttribute('href');
        if (href === '#') return;
        e.preventDefault();
        const el = document.getElementById(href.slice(1));
        if (el) window.scrollTo({ top: el.offsetTop - 90, behavior: 'smooth' });
      });
    });

    // Native lazy-load fallback via IntersectionObserver
    if ('IntersectionObserver' in window) {
      const io = new IntersectionObserver(entries => {
        entries.forEach(({ isIntersecting, target }) => {
          if (isIntersecting && target.dataset.src) {
            target.src = target.dataset.src;
            target.removeAttribute('data-src');
            io.unobserve(target);
          }
        });
      }, { rootMargin: '200px' });

      document.querySelectorAll('img[data-src]').forEach(img => io.observe(img));
    }
  }

  // Cross-component messaging (scroll requests from child components)
  window.addEventListener('message', ({ data }) => {
    if (data?.type === 'scrollToSection') {
      const el = document.getElementById(data.sectionId);
      if (el) window.scrollTo({ top: el.offsetTop - 90, behavior: 'smooth' });
    }
  });

  // Error boundaries
  window.addEventListener('error',              e => console.error('✖ Global:', e.error));
  window.addEventListener('unhandledrejection', e => console.error('✖ Promise:', e.reason));

  // Final performance report
  window.addEventListener('load', () => {
    const ms  = Math.round(performance.now() - _perf.t0);
    const nav = performance.timing;
    console.log(
      `%c STONE HUB TRADERS %c\n` +
      `Load   ${ms}ms\n` +
      `DOM    ${nav.domInteractive - nav.navigationStart}ms\n` +
      `Fonts  ${_perf.fontsReady ? 'Ready' : 'Pending'}\n` +
      `Parts  ${_perf.loaded}/8`,
      'background:#A89070;color:#fff;padding:2px 8px;font-weight:700',
      'color:#A89070'
    );
  });
</script>
