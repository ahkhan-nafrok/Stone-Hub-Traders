        isPremium: true,
        image: 'wash-basin/washbasin3.webp',
        shortDesc: 'An oval freestanding bathtub carved from solid white Makrana marble, built as a sculptural centrepiece.',
        fullDesc: 'The Freestanding Oval Bathtub is carved from solid blocks of white Makrana marble rather than cast or moulded, so it carries genuine stone weight, temperature retention, and veining. Designed to sit freestanding in the centre of a bathroom, it functions as much as sculpture as it does as a tub.',
        features: ['Carved from solid marble blocks', 'Genuine stone weight and thermal retention', 'Freestanding centrepiece installation', 'Natural veining on every surface', 'Sealed, water-safe finish']
      },
      {
        id: 'basin-4',
        title: 'Sculpted Stone Soaking Tub',
        badge: 'Deep Soak',
        tags: ['bathtub', 'freestanding', 'premium'],
        isPremium: true,
        image: 'wash-basin/washbasin4.webp',
        shortDesc: 'Deep soaking tub sculpted with rounded interior walls for a fuller-body bathing experience.',
        fullDesc: 'The Sculpted Stone Soaking Tub is carved deeper than a standard freestanding bath, with rounded interior walls designed for full-body immersion. The added depth and the marble\u2019s natural heat retention make it suited to clients building a dedicated soaking or wellness space.',
        features: ['Deep-soak carved interior', 'Rounded wall profile for comfort', 'Solid marble heat retention', 'Freestanding installation', 'Wellness and spa-suited design']
      },
      {

        title: 'Wall-Mounted Marble Basin',

        tags: ['basin'],
        isPremium: false,
        image: 'wash-basin/washbasin5.webp',
        shortDesc: 'Compact wall-mounted basin designed for powder rooms and smaller bathroom layouts.',
        fullDesc: "The Wall-Mounted Marble Basin is sized and shaped for spaces where a full vanity isn't practical. Mounted directly to the wall, it keeps the floor area open while still bringing solid marble character to a powder room or guest bathroom.",
        features: ['Compact wall-mounted format', 'Suited to powder rooms', 'Open-floor space-saving design', 'Polished solid marble construction', 'Multiple bracket mounting options']
      },
      {

        fullDesc: 'The Double Vanity Trough Basin is carved as a single elongated bowl, long enough to serve two faucet positions across a shared vanity counter. It avoids the visual clutter of two separate basins while still giving each person their own washing space.',
        features: ['Single elongated trough basin', 'Serves two faucet positions', 'Reduces vanity visual clutter', 'Custom length to fit counter', 'Solid marble construction']
      },
      {
        id: 'basin-7',
        title: 'Hand-Carved Floral Basin',
        badge: 'Artisan Elite',
        tags: ['basin', 'premium'],
        isPremium: true,
        image: 'wash-basin/washbasin7.webp',
        shortDesc: 'Basin exterior carved with detailed floral motifs, turning a fixture into a decorative object.',
        fullDesc: 'The Hand-Carved Floral Basin extends the carving traditionally reserved for temples and mandirs into bathroom fixtures. Floral motifs are carved across the exterior of the bowl by hand, so even the underside and outer walls carry detailed craftsmanship, not just the visible rim.',
        features: ['Hand-carved floral exterior motifs', 'Detailing on bowl exterior, not just rim', 'Master artisan craftsmanship', 'Sealed interior for daily use', 'Statement piece for powder rooms']
      },
      {
        id: 'basin-8',
        title: 'Rectangular Freestanding Bathtub',
        badge: 'Modern Design',
        tags: ['bathtub', 'freestanding'],
        isPremium: false,
        image: 'wash-basin/washbasin8.webp',
        shortDesc: 'Clean rectangular freestanding bathtub with straight edges for a modern, architectural bathroom.',
        fullDesc: "The Rectangular Freestanding Bathtub trades the curved lines of a classical tub for straight edges and crisp corners. Built for contemporary bathrooms that want marble's material quality presented in a more architectural, minimal form.",
        features: ['Straight-edged rectangular form', 'Freestanding centrepiece installation', 'Contemporary architectural profile', 'Solid marble construction', 'Sealed, water-safe finish']
      },
      {
        id: 'basin-9',
        title: 'Pedestal Wash Basin',
        badge: 'Classic',
        tags: ['basin'],
        isPremium: false,
        image: 'wash-basin/washbasin9.webp',
        shortDesc: 'Traditional pedestal-mounted basin with a solid marble column base supporting the bowl.',
        fullDesc: 'The Pedestal Wash Basin pairs a polished bowl with a matching solid marble pedestal column, concealing the plumbing while adding floor presence. A traditional bathroom format executed in the same stone as the rest of the collection.',
        features: ['Solid marble pedestal column', 'Conceals plumbing connections', 'Polished bowl and base match', 'Traditional bathroom format', 'Freestanding floor installation']
      },
      {
        id: 'basin-10',
        title: 'Onyx Glow Vessel Basin',
        badge: 'Illuminated',
        tags: ['basin', 'premium'],
        isPremium: true,
        image: 'wash-basin/washbasin10.webp',
        shortDesc: 'Translucent onyx vessel basin designed to glow when lit from beneath the vanity counter.',
        fullDesc: 'The Onyx Glow Vessel Basin is cut thin from translucent onyx marble and paired with an under-counter LED, so the bowl glows softly once lit. A striking option for powder rooms and bar areas where the basin doubles as ambient lighting.',
        features: ['Thin-cut translucent onyx bowl', 'Under-counter LED compatibility', 'Soft ambient glow when lit', 'Above-counter vessel installation', 'Statement piece for powder rooms']
      },
      {
        id: 'basin-11',
        title: 'Roll-Top Inspired Marble Tub',
        badge: 'Heritage',
        tags: ['bathtub', 'freestanding', 'premium'],
        isPremium: true,
        image: 'wash-basin/washbasin11.webp',
        shortDesc: 'Classic roll-top silhouette reimagined in solid carved marble instead of cast iron or acrylic.',
        fullDesc: "The Roll-Top Inspired Marble Tub takes the classic Victorian roll-top silhouette and carves it from solid marble instead of the cast iron or acrylic it's traditionally made from. The familiar curved profile gains the weight, coolness, and veining only solid stone can give it.",
        features: ['Classic roll-top silhouette', 'Carved from solid marble', 'Heavier, cooler than cast alternatives', 'Freestanding centrepiece installation', 'Custom claw or plinth base options']
      },
      {
        id: 'basin-12',
        title: 'Minimalist Rectangular Basin',
        badge: 'Contemporary',
        tags: ['basin'],
        isPremium: false,
        image: 'wash-basin/washbasin12.webp',
        shortDesc: 'Simple rectangular basin with clean edges, built for understated contemporary vanities.',
        fullDesc: "The Minimalist Rectangular Basin keeps the form as plain as possible — clean rectangular edges, a flat polished interior, no carving or applied detail. It suits vanities where the marble's natural surface should be the only feature.",
        features: ['Clean rectangular form', 'Flat polished interior', 'No carving or applied detail', 'Above or under-counter mounting', 'Suited to minimalist vanities']
      }
    ];

    var PAGE_SIZE   = PAGE_CONFIG.pageSize;
    var WA_NUMBER   = PAGE_CONFIG.waNumber;
    var currentPage = 0;
    var currentFilter = 'all';
    var filteredProducts = [];

    function waURL(title) {
      return 'https://wa.me/' + WA_NUMBER
        + '?text=' + encodeURIComponent(
            "Hello Stone Hub Traders, I'm interested in the "
            + title + ' from your ' + PAGE_CONFIG.waPageHint
            + ' collection. Please share details and pricing.'
          );
    }

    function esc(str) {
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(str));
      return d.innerHTML;
    }

    function applyFilter(filter) {
      currentFilter = filter;
      currentPage   = 0;
      filteredProducts = filter === 'all'
        ? PRODUCTS
        : PRODUCTS.filter(function (p) { return p.tags.indexOf(filter) !== -1; });
      document.getElementById('productsGrid').innerHTML = '';
      renderPage();
    }

    function renderPage() {
      var grid  = document.getElementById('productsGrid');
      var start = currentPage * PAGE_SIZE;
      var end   = Math.min(start + PAGE_SIZE, filteredProducts.length);
      var slice = filteredProducts.slice(start, end);
      var frag  = document.createDocumentFragment();

      slice.forEach(function (product, idx) {
        var card = document.createElement('article');
        card.className = 'product-card fade-up';
        card.setAttribute('role', 'listitem');
        card.setAttribute('tabindex', '0');
        card.style.transitionDelay = (idx % PAGE_SIZE * 0.055) + 's';

        card.innerHTML =
          '<div class="card-img-wrap">' +
            '<img class="card-img" src="' + esc(product.image) + '"' +
              ' alt="' + esc(product.title) + '"' +
              ' loading="lazy" decoding="async" />' +
            (product.badge
              ? '<span class="card-badge">' + esc(product.badge) + '</span>'
              : '') +
            (product.isPremium
              ? '<span class="card-badge-star" aria-label="Premium">' +
                  '<i class="fas fa-star" aria-hidden="true"></i>' +
                '</span>'
              : '') +
          '</div>' +
          '<div class="card-body">' +
            '<span class="card-rule" aria-hidden="true"></span>' +
            '<h3 class="card-name">' + esc(product.title) + '</h3>' +
            '<p class="card-desc">' + esc(product.shortDesc) + '</p>' +
            '<div class="card-actions">' +
              '<a href="' + waURL(product.title) + '"' +
                ' class="card-btn card-btn--wa"' +
                ' target="_blank" rel="noopener noreferrer"' +
                ' onclick="event.stopPropagation()"' +
                ' aria-label="WhatsApp inquiry for ' + esc(product.title) + '">' +
                '<i class="fab fa-whatsapp" aria-hidden="true"></i> WhatsApp' +
              '</a>' +
              '<button class="card-btn card-btn--view"' +
                ' aria-label="View details for ' + esc(product.title) + '">' +
                '<i class="fas fa-eye" aria-hidden="true"></i> Details' +
              '</button>' +
            '</div>' +
          '</div>';

        card.addEventListener('click', function (e) {
          if (e.target.closest('.card-btn--wa')) return;
          openModal(product.id);
        });
        card.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(product.id); }
        });
        card.addEventListener('mouseenter', function () {
          var img = card.querySelector('.card-img');
          if (img) img.style.willChange = 'transform';
        });
        card.addEventListener('mouseleave', function () {
          var img = card.querySelector('.card-img');
          if (img) img.style.willChange = '';
        });

        frag.appendChild(card);
      });

      grid.appendChild(frag);
      currentPage++;

      var shown = Math.min(currentPage * PAGE_SIZE, filteredProducts.length);
      document.getElementById('showingCount').textContent = shown;
      document.getElementById('progressBar').style.width =
        (shown / filteredProducts.length * 100) + '%';

      updateLoadMore();
      scheduleReveal();
    }

    function updateLoadMore() {
      var shown   = Math.min(currentPage * PAGE_SIZE, filteredProducts.length);
      var total   = filteredProducts.length;
      var btn     = document.getElementById('loadMoreBtn');
      var info    = document.getElementById('loadMoreInfo');

      if (shown >= total) {
        btn.disabled = true;
        btn.textContent = 'All Designs Shown';
        info.textContent = total + ' of ' + total + ' designs';
      } else {
        var rem = total - shown;
        btn.disabled = false;
        btn.innerHTML =
          'Load More Designs <i class="fas fa-arrow-down" aria-hidden="true"></i>';
        info.textContent = rem + ' more design' + (rem !== 1 ? 's' : '') + ' remaining';
      }
    }

    var revealIO = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          revealIO.unobserve(e.target);
        }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });

    function scheduleReveal() {
      requestAnimationFrame(function () {
        document.querySelectorAll('.fade-up:not(.visible)').forEach(function (el) {
          revealIO.observe(el);
        });
      });
    }

    var _activeId = null;

    function openModal(id) {
      var product = PRODUCTS.find(function (p) { return p.id === id; });
      if (!product) return;
      _activeId = id;

      document.getElementById('modalImg').src       = product.image;
      document.getElementById('modalImg').alt       = product.title;
      document.getElementById('modalBadge').textContent = product.badge;
      document.getElementById('modalTitle').textContent = product.title;
      document.getElementById('modalDesc').textContent  = product.fullDesc;
      document.getElementById('modalWa').href           = waURL(product.title);

      document.getElementById('modalFeatures').innerHTML =
        product.features.map(function (f) {
          return '<li>' + esc(f) + '</li>';
        }).join('');

      document.getElementById('modalBackdrop').classList.add('open');
      document.body.style.overflow = 'hidden';
      document.getElementById('modalClose').focus();
    }

    function closeModal() {
      document.getElementById('modalBackdrop').classList.remove('open');
      document.body.style.overflow = '';
      _activeId = null;
    }

    function openLightbox(src, alt) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightboxImg').alt = alt || '';
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }

    function shareProduct() {
      if (!_activeId) return;
      var p = PRODUCTS.find(function (x) { return x.id === _activeId; });
      if (!p) return;
      if (navigator.share) {
        navigator.share({ title: p.title + ' — Stone Hub Traders', text: p.shortDesc, url: window.location.href }).catch(function(){});
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(window.location.href);
        var btn = document.getElementById('modalShare');
        var prev = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check" aria-hidden="true"></i>';
        setTimeout(function () { btn.innerHTML = prev; }, 1500);
      }
    }

    document.querySelectorAll('.filter-pill').forEach(function (pill) {
      pill.addEventListener('click', function () {
        document.querySelectorAll('.filter-pill').forEach(function (p) { p.classList.remove('active'); });
        pill.classList.add('active');
        applyFilter(pill.dataset.filter);
      });
    });

    document.getElementById('loadMoreBtn').addEventListener('click', renderPage);
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalBackdrop').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });
    document.getElementById('modalImg').addEventListener('click', function () {
      openLightbox(this.src, this.alt);
    });
    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    document.getElementById('lightbox').addEventListener('click', function (e) {
      if (e.target === this) closeLightbox();
    });
    document.getElementById('modalShare').addEventListener('click', shareProduct);
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') { closeLightbox(); closeModal(); }
    });

    applyFilter('all');

    console.log('%c STONE HUB TRADERS %c Wash Basin & Bathtub — ' + PRODUCTS.length + ' designs',
      'background:#A89070;color:#fff;padding:2px 8px;font-weight:700', 'color:#A89070');

  })();
  </script>
