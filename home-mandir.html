<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Mandirs - MSP Stone International</title>
    
    <!-- Optimized Font Loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"></noscript>
    
    <!-- Preconnect for FontAwesome -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"></noscript>
    
    <style>
        :root {
            --dim-gold: #C9A961;
            --pure-black: #000000;
            --pure-white: #FFFFFF;
            --off-white: #F5F5F5;
            --text-dark: #0A0A0A;
        }

        html {
            scroll-behavior: smooth;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--off-white);
            color: var(--text-dark);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* HEADER SECTION */
        .page-header {
            background: var(--pure-black);
            padding: 6rem 0 3rem;
            border-bottom: 3px solid var(--dim-gold);
            position: relative;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 3rem;
            position: relative;
        }

        /* BACK BUTTON */
        .back-btn {
            position: absolute;
            top: 2rem;
            left: 3rem;
            background: var(--dim-gold);
            color: var(--pure-black);
            padding: 0.9rem 2rem;
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            z-index: 10;
            transform: translateZ(0);
        }

        .back-btn:hover {
            background: var(--pure-white);
            transform: translateX(-5px);
        }

        .header-content {
            text-align: center;
            padding-top: 1rem;
        }

        .header-subtitle {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--dim-gold);
            margin-bottom: 1rem;
        }

        .header-title {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--pure-white);
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        .header-description {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.8);
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.7;
        }

        /* PRODUCTS SECTION */
        .products-section {
            padding: 5rem 0;
            background: var(--pure-white);
            contain: layout style paint;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3rem;
            margin-top: 3rem;
        }

        /* PRODUCT CARD */
        .product-card {
            background: var(--pure-black);
            border: 3px solid var(--pure-black);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative;
            cursor: pointer;
            transform: translateZ(0);
            backface-visibility: hidden;
            perspective: 1000px;
            contain: layout style paint;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--dim-gold);
            z-index: 2;
        }

        .product-card:hover {
            transform: translateY(-8px) translateZ(0);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border-color: var(--dim-gold);
        }

        .product-card * {
            pointer-events: none;
        }

        .product-card .btn-whatsapp {
            pointer-events: auto;
        }

        /* IMAGE CONTAINER */
        .product-image {
            position: relative;
            width: 100%;
            height: 400px;
            overflow: hidden;
            background: var(--pure-black);
            transform: translateZ(0);
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.85);
            transition: transform 0.4s ease, filter 0.4s ease;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .product-card:hover .product-image img {
            filter: brightness(1);
            transform: scale(1.05) translateZ(0);
        }

        .premium-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--dim-gold);
            color: var(--pure-black);
            padding: 0.5rem 1rem;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 3;
            box-shadow: 0 4px 15px rgba(201, 169, 97, 0.5);
            transform: translateZ(0);
        }

        /* PRODUCT INFO */
        .product-info {
            padding: 2.5rem 2rem 2rem;
            background: var(--pure-black);
        }

        .product-title {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--dim-gold);
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .product-description {
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        /* BUTTONS */
        .product-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            flex: 1;
            padding: 1.1rem 1.5rem;
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-family: inherit;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            transform: translateZ(0);
        }

        .btn-whatsapp {
            background: #25D366;
            color: var(--pure-white);
        }

        .btn-whatsapp::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #128C7E;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: -1;
        }

        .btn-whatsapp:hover::before {
            transform: translateX(0);
        }

        .btn-whatsapp:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
        }

        .btn-view {
            background: var(--pure-white);
            color: var(--pure-black);
            pointer-events: auto;
        }

        .btn-view::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dim-gold);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: -1;
        }

        .btn-view:hover::before {
            transform: translateX(0);
        }

        .btn-view:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(201, 169, 97, 0.4);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
        }

        .modal-content {
            background: var(--pure-black);
            max-width: 1200px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            transform: scale(0.95) translateZ(0);
            transition: transform 0.3s ease;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.9);
            backface-visibility: hidden;
            scrollbar-width: thin;
            scrollbar-color: var(--dim-gold) var(--pure-black);
            -webkit-overflow-scrolling: touch;
        }

        .modal.active .modal-content {
            transform: scale(1) translateZ(0);
        }

        /* IMAGE ZOOM MODAL */
        .image-zoom-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .image-zoom-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
        }

        .zoom-image-container {
            position: relative;
            max-width: 95%;
            max-height: 95vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zoom-image {
            max-width: 100%;
            max-height: 95vh;
            object-fit: contain;
            border: 2px solid var(--dim-gold);
        }

        .zoom-back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            background: var(--dim-gold);
            color: var(--pure-black);
            border: none;
            padding: 1rem 2rem;
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            z-index: 10001;
        }

        .zoom-back-btn:hover {
            background: var(--pure-white);
            transform: translateX(-5px);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: var(--dim-gold);
            color: var(--pure-black);
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            z-index: 10;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--pure-white);
            transform: rotate(90deg);
        }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 600px;
        }

        .modal-image {
            width: 100%;
            height: 100%;
            min-height: 600px;
            object-fit: cover;
            cursor: pointer;
            transition: filter 0.3s ease;
            transform: translateZ(0);
        }

        .modal-image:hover {
            filter: brightness(1.1);
        }

        .modal-info {
            padding: 4rem 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .modal-badge {
            display: inline-block;
            background: var(--dim-gold);
            color: var(--pure-black);
            padding: 0.5rem 1.2rem;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            width: fit-content;
        }

        .modal-title {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--pure-white);
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .modal-description {
            font-size: 1.05rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .modal-features {
            list-style: none;
            margin-bottom: 3rem;
        }

        .modal-features li {
            font-size: 0.95rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(201, 169, 97, 0.2);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .modal-features li i {
            color: var(--dim-gold);
            font-size: 0.8rem;
        }

        .modal-whatsapp {
            background: #25D366;
            color: var(--pure-white);
            padding: 1.3rem 2.5rem;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            justify-content: center;
            transform: translateZ(0);
        }

        .modal-whatsapp:hover {
            background: #128C7E;
            transform: translateY(-3px) translateZ(0);
            box-shadow: 0 12px 30px rgba(37, 211, 102, 0.4);
        }

        /* SCROLLBAR */
        .modal-content::-webkit-scrollbar {
            width: 10px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: var(--pure-black);
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: var(--dim-gold);
            border-radius: 5px;
        }

        .modal-content::-webkit-scrollbar-thumb:hover {
            background: var(--pure-white);
        }

        /* RESPONSIVE */
        
        /* ULTRA-WIDE DESKTOP (4K and above) */
        @media (min-width: 2560px) {
            .container {
                max-width: 2200px;
                padding: 0 5rem;
            }

            .header-title {
                font-size: 4.5rem;
            }

            .products-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 3rem;
                max-width: 2000px;
                margin-left: auto;
                margin-right: auto;
            }

            .product-image {
                height: 400px;
            }

            .product-card {
                max-width: 500px;
            }
        }

        /* DESKTOP OPTIMIZATIONS FOR LARGE SCREENS */
        @media (min-width: 1921px) and (max-width: 2559px) {
            .container {
                max-width: 1800px;
                padding: 0 4rem;
            }

            .header-title {
                font-size: 4.2rem;
            }

            .products-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 2.5rem;
            }

            .product-image {
                height: 380px;
            }
        }

        @media (min-width: 1601px) and (max-width: 1920px) {
            .container {
                max-width: 1500px;
            }

            .header-title {
                font-size: 4rem;
            }

            .products-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 2.5rem;
            }

            .product-image {
                height: 360px;
            }
        }

        @media (min-width: 1401px) and (max-width: 1600px) {
            .container {
                max-width: 1300px;
            }

            .header-title {
                font-size: 3.8rem;
            }

            .products-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 2.5rem;
            }

            .product-image {
                height: 350px;
            }

            .product-title {
                font-size: 1.7rem;
            }

            .product-description {
                font-size: 0.93rem;
            }

            .modal-content {
                max-width: 1100px;
            }

            .modal-title {
                font-size: 2.7rem;
            }
        }

        @media (max-width: 1200px) {
            .header-title {
                font-size: 3.8rem;
            }

            .products-grid {
                gap: 2.5rem;
            }

            .back-btn {
                top: 1.5rem;
                left: 2rem;
            }
        }

        @media (max-width: 991px) {
            .container {
                padding: 0 2rem;
            }

            .page-header {
                padding: 5.5rem 0 3rem;
            }

            .back-btn {
                top: 1.5rem;
                left: 2rem;
                padding: 0.8rem 1.8rem;
                font-size: 0.75rem;
            }

            .header-content {
                padding-top: 0.5rem;
            }

            .header-title {
                font-size: 3.2rem;
            }

            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 2rem;
            }

            .modal-grid {
                grid-template-columns: 1fr;
            }

            .modal-image {
                min-height: 400px;
            }

            .modal-info {
                padding: 3rem 2rem;
            }

            .modal-title {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 768px) {
            .page-header {
                padding: 5.5rem 0 2rem;
            }

            .back-btn {
                top: 1.5rem;
                left: 1.5rem;
                padding: 0.75rem 1.5rem;
                font-size: 0.7rem;
                letter-spacing: 1.5px;
            }

            .header-content {
                padding-top: 0;
            }

            .header-title {
                font-size: 2.8rem;
                letter-spacing: 2px;
            }

            .header-subtitle {
                font-size: 0.7rem;
                letter-spacing: 4px;
            }

            .header-description {
                font-size: 1rem;
            }

            .products-section {
                padding: 3rem 0;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 2.5rem;
                margin-top: 2rem;
            }

            .product-image {
                height: 380px;
            }

            .product-info {
                padding: 2rem 1.8rem;
            }

            .product-title {
                font-size: 1.6rem;
            }

            .product-description {
                font-size: 0.92rem;
                line-height: 1.65;
            }

            .product-buttons {
                gap: 0.8rem;
            }

            .btn {
                padding: 1rem 1.3rem;
                font-size: 0.75rem;
                letter-spacing: 1.5px;
            }

            .modal-content {
                width: 95%;
            }

            .modal-close {
                width: 45px;
                height: 45px;
                top: 15px;
                right: 15px;
                font-size: 1.3rem;
            }

            .modal-image {
                min-height: 300px;
            }

            .modal-info {
                padding: 2.5rem 1.5rem;
            }

            .modal-title {
                font-size: 2rem;
            }

            .modal-description {
                font-size: 0.95rem;
            }

            .modal-features li {
                font-size: 0.9rem;
                padding: 0.7rem 0;
            }

            .modal-whatsapp {
                padding: 1.1rem 2rem;
                font-size: 0.8rem;
            }

            .zoom-back-btn {
                top: 20px;
                left: 20px;
                padding: 0.9rem 1.8rem;
                font-size: 0.75rem;
            }

            .zoom-image {
                max-height: 85vh;
            }
        }

        @media (max-width: 576px) {
            .container {
                padding: 0 1.5rem;
            }

            .page-header {
                padding: 5rem 0 1.5rem;
            }

            .back-btn {
                top: 1.2rem;
                left: 1.5rem;
                padding: 0.7rem 1.3rem;
                font-size: 0.65rem;
                letter-spacing: 1px;
                gap: 0.5rem;
            }

            .header-title {
                font-size: 2rem;
                letter-spacing: 1px;
            }

            .header-description {
                font-size: 0.9rem;
                line-height: 1.6;
            }

            .products-grid {
                gap: 2rem;
            }

            .product-image {
                height: 320px;
            }

            .product-card {
                border-width: 2px;
            }

            .product-info {
                padding: 1.8rem 1.5rem;
            }

            .product-title {
                font-size: 1.4rem;
                letter-spacing: 0.5px;
            }

            .product-description {
                font-size: 0.88rem;
                line-height: 1.6;
                margin-bottom: 1.5rem;
            }

            .product-buttons {
                flex-direction: column;
                gap: 0.7rem;
            }

            .btn {
                padding: 0.95rem 1.2rem;
                font-size: 0.72rem;
                letter-spacing: 1.2px;
            }

            .premium-badge {
                padding: 0.4rem 0.8rem;
                font-size: 0.6rem;
                top: 15px;
                right: 15px;
            }

            .modal-title {
                font-size: 1.7rem;
            }

            .zoom-back-btn {
                top: 15px;
                left: 15px;
                padding: 0.8rem 1.5rem;
                font-size: 0.7rem;
                letter-spacing: 1.5px;
            }

            .zoom-image {
                border-width: 1px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="page-header">
        <div class="container">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                Back to Home
            </a>
            <div class="header-content">
                <p class="header-subtitle">Sacred Spaces</p>
                <h1 class="header-title">Premium Home Mandirs</h1>
                <p class="header-description">
                    Handcrafted marble temples designed to bring divine elegance to your home. 
                    Each piece is a masterpiece of traditional artistry and spiritual devotion.
                </p>
            </div>
        </div>
    </header>

    <!-- PRODUCTS (Dynamically Generated) -->
    <section class="products-section">
        <div class="container">
            <div class="products-grid" id="productsGrid">
                <!-- Products will be dynamically inserted here -->
            </div>
        </div>
    </section>

    <!-- MODAL -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">
                <i class="fas fa-times"></i>
            </button>
            <div class="modal-grid">
                <img src="" alt="Product" class="modal-image" id="modalImage" onclick="openImageZoom()" loading="lazy">
                <div class="modal-info">
                    <span class="modal-badge" id="modalBadge">Premium Collection</span>
                    <h2 class="modal-title" id="modalTitle">Product Name</h2>
                    <p class="modal-description" id="modalDescription">
                        Product description goes here...
                    </p>
                    <ul class="modal-features" id="modalFeatures">
                        <!-- Features will be inserted here -->
                    </ul>
                    <a href="" class="modal-whatsapp" id="modalWhatsapp" target="_blank" rel="noopener">
                        <i class="fab fa-whatsapp"></i>
                        Inquire on WhatsApp
                    </a>
                </div>
            </div>
        </div>

        const getWhatsAppURL = (title) => `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(`I'm interested in the ${title}`)}`;

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const fragment = document.createDocumentFragment();

            PRODUCTS.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = (e) => openModal(product.id, e);

                card.innerHTML = `
                    <div class="product-image">
                        ${product.isPremium ? '<span class="premium-badge">Premium</span>' : ''}
                        <img src="${product.image}" alt="${product.title}" loading="lazy" decoding="async">
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">${product.title}</h3>
                        <p class="product-description">${product.shortDescription}</p>
                        <div class="product-buttons">
                            <a href="${getWhatsAppURL(product.title)}" 
                               class="btn btn-whatsapp" 
                               target="_blank" 
                               rel="noopener"
                               onclick="event.stopPropagation()">
                                <i class="fab fa-whatsapp"></i>
                                WhatsApp
                            </a>
                            <button class="btn btn-view">
                                <i class="fas fa-eye"></i>
                                View Details
                            </button>
                        </div>
                    </div>
                `;

                fragment.appendChild(card);
            });

            grid.appendChild(fragment);
        }

        function openModal(productId, event) {
            event?.stopPropagation();
            
            const product = PRODUCTS.find(p => p.id === productId);
            if (!product) return;

            const modal = document.getElementById('productModal');
            
            document.getElementById('modalTitle').textContent = product.title;
            document.getElementById('modalBadge').textContent = product.badge;
            document.getElementById('modalImage').src = product.image;
            document.getElementById('modalDescription').textContent = product.fullDescription;
            document.getElementById('modalWhatsapp').href = getWhatsAppURL(product.title);
            
            const featuresList = document.getElementById('modalFeatures');
            featuresList.innerHTML = product.features.map(f => 
                `<li><i class="fas fa-check-circle"></i> ${f}</li>`
            ).join('');
            
            // Use requestAnimationFrame for smooth animation
            requestAnimationFrame(() => {
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            });
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function openImageZoom() {
            const zoomModal = document.getElementById('imageZoomModal');
            document.getElementById('zoomImage').src = document.getElementById('modalImage').src;
            requestAnimationFrame(() => {
                zoomModal.classList.add('active');
            });
        }

        function closeImageZoom() {
            document.getElementById('imageZoomModal').classList.remove('active');
        }

        // ==========================================
        // 🎬 EVENT LISTENERS
        // ==========================================

        document.getElementById('productModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        }, { passive: true });

        document.getElementById('imageZoomModal').addEventListener('click', function(e) {
            if (e.target === this || e.target.classList.contains('zoom-image-container')) {
                closeImageZoom();
            }
        }, { passive: true });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                closeImageZoom();
            }
        });

        // ==========================================
        // 🚀 INITIALIZE
        // ==========================================
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', renderProducts);
        } else {
            renderProducts();
        }
