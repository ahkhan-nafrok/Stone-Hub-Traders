<style>
  /* ============================================================
     NAVBAR — STONE HUB TRADERS
     Text-only wordmark. No images.
     Transparent → white text / Scrolled → black text
  ============================================================ */

  .header {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
    background: transparent;
    border-bottom: 1px solid transparent;
    padding: clamp(1.1rem, 2.2vw, 1.7rem) 0;
    transition:
      background    0.4s cubic-bezier(0.4, 0, 0.2, 1),
      padding       0.4s cubic-bezier(0.4, 0, 0.2, 1),
      border-color  0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .header.scrolled {
    background: rgba(246, 243, 239, 0.97);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    padding: clamp(0.7rem, 1.3vw, 1rem) 0;
    border-bottom: 1px solid rgba(168, 144, 112, 0.22);
  }

  /* ── Rail ── */
  .nav-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 clamp(20px, 4vw, 60px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  /* ── Text-only wordmark ── */
  .nav-logo {
    display: flex;
    flex-direction: column;
    gap: 3px;
    text-decoration: none;
    z-index: 1001;
    flex-shrink: 0;
    line-height: 1;
  }

  /* Main brand name */
  .nav-logo-name {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(0.72rem, 1.1vw, 0.88rem);
    font-weight: 700;
    letter-spacing: clamp(3px, 0.5vw, 5px);
    text-transform: uppercase;
    color: var(--pure-white, #fff);
    white-space: nowrap;
    transition: color 0.35s ease;
  }

  /* Sub-label in gold — always gold, never switches */
  .nav-logo-sub {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(0.5rem, 0.65vw, 0.58rem);
    font-weight: 400;
    letter-spacing: clamp(3px, 0.5vw, 5px);
    text-transform: uppercase;
    color: var(--gold, #A89070);
    white-space: nowrap;
    transition: opacity 0.35s ease;
  }

  /* Scrolled: name goes black */
  .header.scrolled .nav-logo-name {
    color: var(--charcoal, #111);
  }

  /* ── Nav links ── */
  .nav-links {
    display: flex;
    align-items: center;
    gap: clamp(1.6rem, 3vw, 3.5rem);
    list-style: none;
  }

  .nav-link {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(0.58rem, 0.72vw, 0.66rem);
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    color: rgba(255, 255, 255, 0.82);
    position: relative;
    padding: 4px 0;
    transition: color 0.25s ease;
  }

  /* Underline grows from left */
  .nav-link::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 1px;
    background: var(--gold, #A89070);
    transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .nav-link:hover { color: var(--pure-white, #fff); }
  .nav-link:hover::after { width: 100%; }

  /* Scrolled: dark text */
  .header.scrolled .nav-link { color: rgba(30, 30, 30, 0.72); }
  .header.scrolled .nav-link:hover { color: var(--charcoal, #111); }

  /* Contact CTA — always gold-bordered */
  .nav-link.nav-cta {
    color: var(--gold, #A89070);
    border: 1px solid rgba(168, 144, 112, 0.38);
    padding: 7px 18px;
    transition: color 0.22s ease, background 0.22s ease, border-color 0.22s ease;
  }

  .nav-link.nav-cta::after { display: none; }

  .nav-link.nav-cta:hover {
    background: var(--gold, #A89070);
    color: var(--pure-white, #fff);
    border-color: var(--gold, #A89070);
  }

  .header.scrolled .nav-link.nav-cta {
    color: var(--gold, #A89070);
    border-color: rgba(168, 144, 112, 0.38);
  }

  /* ── Hamburger ── */
  .nav-toggle {
    display: none;
    cursor: pointer;
    background: none;
    border: none;
    width: 26px;
    height: 18px;
    position: relative;
    z-index: 1002;
    padding: 0;
    flex-shrink: 0;
  }

  .nav-toggle span {
    display: block;
    position: absolute;
    left: 0;
    height: 1.5px;
    background: var(--pure-white, #fff);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .nav-toggle span:nth-child(1) { top: 0;   width: 100%; }
  .nav-toggle span:nth-child(2) { top: 50%; width: 65%; left: 17.5%; transform: translateY(-50%); }
  .nav-toggle span:nth-child(3) { bottom: 0; width: 100%; }

  .header.scrolled .nav-toggle span { background: var(--charcoal, #111); }

  /* Active → X in gold */
  .nav-toggle.open span:nth-child(1) {
    top: 50%; width: 100%; left: 0;
    transform: translateY(-50%) rotate(45deg);
    background: var(--gold, #A89070);
  }
  .nav-toggle.open span:nth-child(2) { opacity: 0; width: 0; }
  .nav-toggle.open span:nth-child(3) {
    bottom: auto; top: 50%;
    transform: translateY(-50%) rotate(-45deg);
    background: var(--gold, #A89070);
  }

  /* ── Mobile overlay ── */
  .nav-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    opacity: 0;
    visibility: hidden;
    z-index: 999;
    transition: opacity 0.4s ease, visibility 0.4s ease;
  }
  .nav-overlay.open { opacity: 1; visibility: visible; }

  /* ============================================================
     RESPONSIVE
  ============================================================ */
  @media (max-width: 991px) {
    .nav-toggle { display: block; }

    .nav-links {
      position: fixed;
      top: 0; right: -100%;
      width: 100%; height: 100vh;
      background: rgba(8, 8, 8, 0.99);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 0;
      padding: 5rem 2rem;
      transition: right 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1001;
    }

    .nav-links.open { right: 0; }

    .nav-links li {
      width: 100%;
      text-align: center;
      border-bottom: 1px solid rgba(168, 144, 112, 0.1);
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .nav-links.open li                { opacity: 1; transform: translateY(0); }
    .nav-links.open li:nth-child(1)   { transition-delay: 0.07s; }
    .nav-links.open li:nth-child(2)   { transition-delay: 0.12s; }
    .nav-links.open li:nth-child(3)   { transition-delay: 0.17s; }
    .nav-links.open li:nth-child(4)   { transition-delay: 0.22s; }
    .nav-links.open li:nth-child(5)   { transition-delay: 0.27s; }

    .nav-link {
      font-size: 1.2rem    !important;
      letter-spacing: 5px  !important;
      padding: 1.6rem 0    !important;
      color: rgba(255, 255, 255, 0.82) !important;
      display: block;
      width: 100%;
    }

    .nav-link::after { display: none !important; }
    .nav-link:hover  { color: var(--gold, #A89070) !important; }

    .nav-link.nav-cta {
      border: none !important;
      background: transparent !important;
      color: var(--gold, #A89070) !important;
      padding: 1.6rem 0 !important;
    }
  }

  @media (max-width: 480px) {
    .nav-logo-name { font-size: 0.72rem; letter-spacing: 2px; }
    .nav-logo-sub  { font-size: 0.5rem;  letter-spacing: 2px; }

    .nav-link {
      font-size: 1rem   !important;
      letter-spacing: 4px !important;
      padding: 1.3rem 0 !important;
    }
  }
</style>

<header class="header" id="header">
  <nav class="nav-inner">

    <!-- Text-only logo -->
    <a href="#home" class="nav-logo">
      <span class="nav-logo-name">Stone Hub Traders</span>
      <span class="nav-logo-sub">Premium Marble &amp; Granite</span>
    </a>

    <!-- Hamburger (mobile) -->
    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Links -->
    <ul class="nav-links" id="navLinks" role="list">
      <li><a class="nav-link" href="#home">Home</a></li>
      <li><a class="nav-link" href="#about">About</a></li>
      <li><a class="nav-link" href="#categories">Collections</a></li>
      <li><a class="nav-link" href="#gallery">Gallery</a></li>
      <li><a class="nav-link nav-cta" href="#contact">Contact</a></li>
    </ul>

  </nav>
</header>

<div class="nav-overlay" id="navOverlay"></div>

<script>
(function () {
  function initNavbar() {
    var header  = document.getElementById('header');
    var toggle  = document.getElementById('navToggle');
    var links   = document.getElementById('navLinks');
    var overlay = document.getElementById('navOverlay');

    if (!header || !toggle || !links) { setTimeout(initNavbar, 100); return; }

    function closeMenu() {
      toggle.classList.remove('open');
      links.classList.remove('open');
      overlay.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }

    function openMenu() {
      toggle.classList.add('open');
      links.classList.add('open');
      overlay.classList.add('open');
      toggle.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';
    }

    toggle.addEventListener('click', function (e) {
      e.stopPropagation();
      links.classList.contains('open') ? closeMenu() : openMenu();
    });

    overlay.addEventListener('click', closeMenu);

    links.querySelectorAll('.nav-link').forEach(function (link) {
      link.addEventListener('click', function (e) {
        e.preventDefault();
        closeMenu();
        var id = link.getAttribute('href').slice(1);
        var el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 90, behavior: 'smooth' });
      });
    });

    /* Scroll: transparent → filled */
    var ticking = false;
    window.addEventListener('scroll', function () {
      if (ticking) return;
      requestAnimationFrame(function () {
        header.classList.toggle('scrolled', window.scrollY > window.innerHeight * 0.25);
        ticking = false;
      });
      ticking = true;
    }, { passive: true });

    console.log('✔ Navbar initialized');
  }

  document.readyState === 'loading'
    ? document.addEventListener('DOMContentLoaded', initNavbar)
    : initNavbar();
})();
</script>
